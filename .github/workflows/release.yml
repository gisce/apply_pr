name: Sastre_Release

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: python:2.7-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade "pip<21" "setuptools<45" "wheel<0.35" "twine<2" "virtualenv<20.22" "pyinstaller==3.3.1"
      - name: Generate binary
        run: |
          pip install -e .
          pyinstaller --onefile -n sastre apply_pr/cli.py
      - name: Creating a realease/pre-release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/sastre
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') }}
          generate_release_notes: true
      - run: rm -r dist
      - name: Publish a Python distribution to PyPI
        if: ${{ !contains(github.ref, '-rc') }}
        env:
          PYPI_MASTER_TOKEN: ${{ secrets.PYPI_MASTER_TOKEN }}
          PYTHON_TOKEN: ${{ secrets.PYTHON_TOKEN }}
        run: |
          export PYPI_TOKEN="${PYPI_MASTER_TOKEN:-${PYTHON_TOKEN:-}}"
          if [ -z "${PYPI_TOKEN}" ]; then
            echo "No PYPI_MASTER_TOKEN or PYTHON_TOKEN configured; skipping PyPI publish"
            exit 0
          fi
          echo "::add-mask::${PYPI_TOKEN}"
          python setup.py sdist bdist_wheel
          twine upload --non-interactive -u __token__ -p "${PYPI_TOKEN}" dist/*
